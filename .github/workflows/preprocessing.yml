name: Data Preprocessing Pipeline

on:
  push:
    paths:
      - 'namadataset_raw/**'
      - 'preprocessing/automate_fikriars.py'
  workflow_dispatch:

jobs:
  preprocess:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12.7'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pandas scikit-learn

    - name: Run automation script
      run: |
        cd preprocessing
        python automate_fikriars.py --input ../namadataset_raw/high_diamond_ranked_10min.csv --output_dir ../namadataset_preprocessing

    - name: Commit and push changes
      run: |
        git config --global user.name "github-actions[bot]"
        git config --global user.email "github-actions[bot]@users.noreply.github.com"
        git add namadataset_preprocessing/data_clean.csv
        git commit -m "Auto-update preprocessed dataset" || echo "No changes to commit"
        git push
